name: Release
run-name: ${{ github.workflow }} ${{ github.event.inputs.release-version }}
on:
  workflow_dispatch:
    inputs:
      release-version:
        description: Enter version to release (e.g., 1.0.1).
        required: false
jobs:
  perform:
    if: github.repository_owner == 'opendevise' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: releases
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
    - name: Run linter
      run: |
        npm run tidy
        npm pkg fix
        if [ -n "$(git --no-pager diff --name-only)" ]; then
          echo 'Detected pending code style changes'
          git --no-pager diff
          exit 1
        fi
    - name: Run tests
      run: npm test
    - name: Set up release environment
      run: |
        echo RELEASE_VERSION=${{ github.event.inputs.release-version }} >> $GITHUB_ENV
        echo RELEASE_NPM_TOKEN=${{ secrets[format('NPM_TOKEN_{0}', github.actor)] }} >> $GITHUB_ENV
    - name: Build, tag, and publish npm package
      run: |
        curl -o npm/release.sh -sS https://gitlab.com/opendevise/oss/we-are-releasing/-/raw/main/npm-release-from-github.sh
        bash npm/release.sh
